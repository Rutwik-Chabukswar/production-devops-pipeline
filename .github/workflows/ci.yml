name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ✅ LOGIN AFTER CODE IS VERIFIED
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # ✅ BUILD IMAGE WITH VERSION TAG
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/node-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/node-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest

      # ✅ PUSH BOTH TAGS
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/node-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest